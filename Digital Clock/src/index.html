<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeLine</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header class="site-header">
      <nav class="main-nav" aria-label="Primary navigation">
        <a class="brand" href="#clock-section">TimeLine</a>
        <div class="nav-actions">
          <button id="toggleTheme" type="button" aria-pressed="false">Toggle Theme</button>
        </div>
      </nav>
    </header>

    <main class="app-shell">
      <section class="clock-card" id="clock-section">
        <p class="eyebrow">Current time</p>
        <div id="clock">--:--:--</div>
        <p class="subtitle">A clean, responsive digital clock experience.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
